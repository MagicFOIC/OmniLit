global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: omnilit-cloud-api
    metrics_path: /internal/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/cloud_metrics_token
    static_configs:
      - targets:
          - cloud-api:8787
